<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> JS Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f8fafc; /* Cool off-white background */
      --card-bg: #ffffff; /* Crisp white card */
      --card-border: #e2e8f0; /* Soft slate-200 border */
      --text-main: #0f172a; /* Deep slate-900 */
      --text-muted: #64748b; /* Slate-500 */
      --primary: #2563eb; /* Modern brand blue-600 */
      --primary-hover: #1d4ed8; /* Blue-700 */
      --primary-glow: #eff6ff; /* Soft blue-50 */
      --emerald: #16a34a; /* Emerald green */
      --emerald-glow: #f0fdf4; /* Soft green-50 */
      --radius-lg: 16px;
      --radius-md: 8px;
      --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Minimal Technical Card Container */
    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 
                  0 10px 15px -3px rgba(0, 0, 0, 0.05);
      transition: var(--transition-base);
    }

    /* Clean Editorial Header */
    .quiz-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .quiz-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .quiz-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Minimalist Progress Indicators */
    .progress-container {
      margin-bottom: 28px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.775rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .progress-label {
      color: var(--text-muted);
    }

    .progress-percentage {
      color: var(--primary);
    }

    .progress-bar-bg {
      background: #f1f5f9;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: var(--primary);
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* Question Container & Text */
    #question-text {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.45;
      text-align: center;
      margin-bottom: 28px;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    /* Choice Options Container */
    #choices-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }

    /* Flat Choice Cards */
    .choice-card {
      background: #ffffff;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      color: #334155;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: space-between;
      outline: none;
    }

    .choice-card:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    /* Choice Selected Highlight */
    .choice-card.selected {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 600;
    }

    /* Action Navigation Row */
    .action-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    /* Flat Action Buttons */
    .btn-pill {
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 24px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-base);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-start-test, .btn-end-test {
      width: 100%;
      background: var(--primary);
      color: #ffffff;
    }

    .btn-start-test:hover, .btn-end-test:hover {
      background: var(--primary-hover);
    }

    .btn-prev-nav {
      background: #ffffff;
      border: 1px solid var(--card-border);
      color: #334155;
    }

    .btn-prev-nav:hover {
      background: #f8fafc;
      border-color: #cbd5e1;
    }

    .btn-next-nav {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-next-nav:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-next-nav:disabled {
      background: #f1f5f9;
      color: #94a3b8;
      border: 1px solid var(--card-border);
      cursor: not-allowed;
      opacity: 0.85;
    }

    /* Results Dashboard Widget */
    .congratulations-msg {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      color: var(--emerald);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .table th {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.725rem;
      letter-spacing: 0.05em;
      padding: 10px 12px;
      border-bottom: 1px solid var(--card-border);
      text-align: left;
    }

    .table td {
      padding: 12px 12px;
      color: var(--text-main);
      border-bottom: 1px solid #f1f5f9;
      font-size: 0.825rem;
    }

    .table tr:last-child td {
      border-bottom: none;
    }

    .table tr:hover td {
      background-color: #f8fafc;
    }

    /* Minimal correct answers badge */
    .badge-correct {
      display: inline-block;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 4px;
      background: var(--emerald-glow);
      color: var(--emerald);
      border: 1px solid rgba(22, 163, 74, 0.15);
    }

    /* Smooth Fade-in Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-active {
      animation: fadeInUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Custom Scrollbar for Card */
    .quiz-card::-webkit-scrollbar {
      width: 4px;
    }
    .quiz-card::-webkit-scrollbar-track {
      background: transparent;
    }
    .quiz-card::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="quiz-card" id="quiz-card-wrapper">
      
      <!-- Top Brand Header -->
      <div class="quiz-header">
        <h1>Interactive Quiz</h1>
        <p>Test your knowledge in JavaScript & Frontend Development</p>
      </div>

      <!-- Custom Progress Bar -->
      <div class="progress-container" id="progress-container" style="display: none;">
        <div class="progress-info">
          <span class="progress-label" id="progress-text">Question 1 of 10</span>
          <span class="progress-percentage" id="progress-percentage">10%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Main card body content containing the question and choices -->
      <div id="container">
        <h3 id="question-text">
          Ready to start the quiz challenge? Click below to begin.
        </h3>

        <!-- Styled Option Button Stack -->
        <div id="choices-container" style="display: none;">
          <button class="choice-card" id="option1" onclick="getOption(this)"></button>
          <button class="choice-card" id="option2" onclick="getOption(this)"></button>
          <button class="choice-card" id="option3" onclick="getOption(this)"></button>
          <button class="choice-card" id="option4" onclick="getOption(this)"></button>
        </div>

        <!-- Initial Start and Final Submit Buttons -->
        <div>
          <button id="startBtn" class="btn-pill btn-start-test" onclick="startTest()">Start Test</button>
          <button id="endBtn" class="btn-pill btn-end-test" style="display: none;" onclick="endBtn()">End Test</button>
        </div>

        <!-- Prev/Next Navigation Controls -->
        <div id="btn" class="action-row" style="display: none;">
          <button id="prev-btn" class="btn-pill btn-prev-nav" onclick="prev()">Prev</button>
          <button id="next-btn" class="btn-pill btn-next-nav" onclick="next()" disabled>Next</button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
